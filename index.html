<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Star Rewards</title>
  <style>
    :root {
      --bg: #fdf7ff;
      --card: #ffffff;
      --primary: #ff8fb1;
      --secondary: #ffd56b;
      --accent: #6ec1e4;
      --text: #2f2d44;
      --muted: #6a6a8b;
      --shadow: 0 18px 40px rgba(111, 86, 255, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top left, #ffd7e5 0%, #f7f3ff 40%, #e9f7ff 100%);
      color: var(--text);
      padding: 24px;
    }

    .page-wrapper {
      max-width: 960px;
      margin: 0 auto;
    }

    .hero {
      background: linear-gradient(135deg, #ffe3ed 0%, #fff6c8 100%);
      border-radius: 32px;
      padding: 28px;
      box-shadow: var(--shadow);
      margin-bottom: 28px;
    }

    .hero h1 {
      font-size: 2.6rem;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .hero p {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
      max-width: 620px;
    }

    .murid-list {
      display: grid;
      gap: 18px;
    }

    .murid-card {
      background: var(--card);
      border-radius: 28px;
      padding: 20px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
    }

    .murid-detail {
      display: grid;
      gap: 8px;
    }

    .murid-detail h2 {
      font-size: 1.25rem;
      margin-bottom: 4px;
    }

    .murid-detail span {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .star-group {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: #eaf9ff;
      border-radius: 20px;
      font-weight: 700;
      color: #0f4f78;
      min-width: 120px;
      justify-content: center;
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 16px;
      cursor: pointer;
      font-weight: 700;
      min-width: 48px;
      min-height: 48px;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(126, 160, 255, 0.18);
    }

    .button-add {
      background: linear-gradient(135deg, #75d6ff 0%, #4563ff 100%);
      color: white;
    }

    .button-remove {
      background: linear-gradient(135deg, #ff8b8b 0%, #ff4d4d 100%);
      color: white;
    }

    .status-panel {
      background: #ffffffcc;
      border-radius: 24px;
      padding: 18px 22px;
      box-shadow: var(--shadow);
      margin-bottom: 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .status-panel strong {
      color: var(--text);
      font-size: 0.98rem;
    }

    .placeholder {
      padding: 24px;
      border-radius: 24px;
      background: #fff5f0;
      color: var(--muted);
      text-align: center;
      font-size: 1rem;
      border: 1px dashed #ffd0c1;
    }

    .message {
      text-align: center;
      margin-top: 20px;
      color: var(--muted);
      font-size: 0.98rem;
    }
  </style>
</head>
<body onload="initPage()">
  <div class="page-wrapper">
    <section class="hero">
      <h1>Star Rewards</h1>
      <p>Selamat datang! Di sini anda boleh melihat jadual murid, jumlah bintang mereka, dan tambahkan atau kurangkan bintang dengan mudah.</p>
    </section>

    <section class="status-panel">
      <strong>Senarai Murid</strong>
      <span id="countInfo">Memuatkan...</span>
    </section>

    <section id="muridList" class="murid-list">
      <div class="placeholder">Memuatkan data murid...</div>
    </section>

    <p class="message">Tekan butang + untuk tambah bintang, dan - untuk kurangkan bintang.</p>
  </div>

  <script>
    function initPage() {
      fetchData();
    }

    function fetchData() {
      const listContainer = document.getElementById('muridList');
      const countInfo = document.getElementById('countInfo');
      listContainer.innerHTML = '<div class="placeholder">Memuatkan data murid...</div>';
      countInfo.textContent = 'Sedang memuatkan...';

      google.script.run
        .withSuccessHandler(function(data) {
          renderMuridList(data);
        })
        .withFailureHandler(function(error) {
          listContainer.innerHTML = '<div class="placeholder">Ralat memuatkan data. Sila cuba lagi.</div>';
          countInfo.textContent = 'Ralat';
          console.error(error);
        })
        .dapatkanDataMurid();
    }

    function renderMuridList(data) {
      const listContainer = document.getElementById('muridList');
      const countInfo = document.getElementById('countInfo');

      if (!data || !data.length) {
        listContainer.innerHTML = '<div class="placeholder">Tiada data murid ditemui. Pastikan Google Sheet mengandungi lajur ID, Nama, dan Bintang.</div>';
        countInfo.textContent = '0 murid';
        return;
      }

      countInfo.textContent = data.length + ' murid';
      listContainer.innerHTML = '';

      data.forEach(function(murid, index) {
        const rowIndex = index + 2;
        const card = document.createElement('article');
        card.className = 'murid-card';
        card.innerHTML =
          '<div class="murid-detail">' +
            '<h2>' + escapeHtml(murid.nama || 'Nama tidak ada') + '</h2>' +
            '<span>ID: ' + escapeHtml(murid.id || '-') + '</span>' +
            '<span>Baris Google Sheet: ' + rowIndex + '</span>' +
          '</div>' +
          '<div class="button-group">' +
            '<div class="star-group">? ' + Number(murid.bintang || 0) + '</div>' +
            '<button class="button-remove" type="button" onclick="updateBintang(' + rowIndex + ', ' + Number(murid.bintang || 0) + ', -1)">-</button>' +
            '<button class="button-add" type="button" onclick="updateBintang(' + rowIndex + ', ' + Number(murid.bintang || 0) + ', 1)">+</button>' +
          '</div>';

        listContainer.appendChild(card);
      });
    }

    function updateBintang(row, currentValue, delta) {
      const newValue = Number(currentValue) + Number(delta);
      if (newValue < 0) {
        alert('Jumlah bintang tidak boleh negatif.');
        return;
      }

      google.script.run
        .withSuccessHandler(function(response) {
          if (response && response.berjaya) {
            fetchData();
          } else {
            alert('Tidak dapat kemaskini bintang. ' + (response.mesej || 'Sila cuba lagi.'));
          }
        })
        .withFailureHandler(function(error) {
          alert('Ralat sambungan. Sila cuba semula.');
          console.error(error);
        })
        .kemaskiniBintang(row, newValue);
    }

    function escapeHtml(text) {
      var map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return String(text).replace(/[&<>"']/g, function(m) { return map[m]; });
    }
  </script>
</body>
</html>
